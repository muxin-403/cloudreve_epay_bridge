name: Build And Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 0.0.1)'
        required: true
        default: '0.0.1'

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
      release_tag: ${{ steps.vars.outputs.release_tag }}
      is_tag_event: ${{ steps.vars.outputs.is_tag_event }}
    steps:
      - name: Resolve Version
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
            IS_TAG_EVENT="true"
          else
            VERSION="${{ github.event.inputs.version }}"
            TAG="v${VERSION}"
            IS_TAG_EVENT="false"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "is_tag_event=${IS_TAG_EVENT}" >> "$GITHUB_OUTPUT"

  build-standalone:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: zip

      - name: Build standalone file
        run: |
          php scripts/build-single.php --version=${{ needs.prepare.outputs.version }}
          sha256sum dist/cloudreve_epay_bridge-v${{ needs.prepare.outputs.version }}.php > dist/cloudreve_epay_bridge-v${{ needs.prepare.outputs.version }}.php.sha256

      - name: Upload standalone artifact
        uses: actions/upload-artifact@v4
        with:
          name: standalone-v${{ needs.prepare.outputs.version }}
          path: |
            dist/cloudreve_epay_bridge-v${{ needs.prepare.outputs.version }}.php
            dist/cloudreve_epay_bridge-v${{ needs.prepare.outputs.version }}.php.sha256

  build-docker:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.prepare.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-standalone
      - build-docker
    if: needs.prepare.outputs.is_tag_event == 'true'
    steps:
      - name: Download standalone artifact
        uses: actions/download-artifact@v4
        with:
          name: standalone-v${{ needs.prepare.outputs.version }}
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: Cloudreve Epay Bridge ${{ needs.prepare.outputs.release_tag }}
          files: |
            dist/cloudreve_epay_bridge-v${{ needs.prepare.outputs.version }}.php
            dist/cloudreve_epay_bridge-v${{ needs.prepare.outputs.version }}.php.sha256
          generate_release_notes: true
